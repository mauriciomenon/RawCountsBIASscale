name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Scan tracked files for obvious secrets
        shell: bash
        run: |
          set -euo pipefail
          PATTERN='(password|passwd|pwd|secret|token|api[_-]?key|private[_-]?key|client[_-]?secret|access[_-]?token).{0,40}[:=][[:space:]]*["'"'"']?[A-Za-z0-9_./+=:@%-]{20,}'
          if grep -REIn --binary-files=without-match --exclude-dir=.git --exclude='secret_scan.yml' "$PATTERN" .; then
            echo '[ERROR] Sensitive patterns found.' >&2
            exit 1
          fi
          echo '[OK] No obvious sensitive patterns found.'